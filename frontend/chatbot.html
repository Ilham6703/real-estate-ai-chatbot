<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>1Beegha Chatbot</title>

    <link rel="stylesheet"
          href="chatbot.css">

    <!-- Google Font -->
    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <!-- Floating Chat Button -->

    <button id="chat-toggle">

        <i class="fa-solid fa-comments"></i>

    </button>


    <!-- Chat Window -->

    <div id="chat-container"
         class="hidden">

        <!-- Header -->

        <div class="chat-header">

            <div>

                <h2>🏡 1Beegha</h2>

                <p>Find Your Perfect Property</p>

            </div>

            <button id="close-chat">

                <i class="fa-solid fa-xmark"></i>

            </button>

        </div>


        <!-- Welcome Section -->

        <div class="welcome-card">

            <h3>👋 Welcome!</h3>

            <p>

                I'm here to help you explore our
                projects, pricing, locations,
                amenities and booking process.

            </p>

            <span>

                How can I help you today?

            </span>

        </div>


        <!-- Quick Suggestions -->

        <div class="quick-actions">

            <button class="suggestion">

                🏘️ View Projects

            </button>

            <button class="suggestion">

                💰 Pricing

            </button>

            <button class="suggestion">

                📍 Project Locations

            </button>

            <button class="suggestion">

                📞 Contact Sales

            </button>

        </div>


        <!-- Chat Messages -->

        <div id="chat-box">

        </div>


        <!-- Typing Indicator -->

        <div id="typing-indicator"
             class="hidden">

            <span></span>

            <span></span>

            <span></span>

        </div>


        <!-- Input Area -->

        <div class="chat-input">

            <input

                type="text"

                id="user-input"

                placeholder="Ask anything about our properties..."

                autocomplete="off">

            <button id="send-btn">

                <i class="fa-solid fa-paper-plane"></i>

            </button>

        </div>

    </div>

    <script src="chatbot.js"></script>

</body>

</html>
